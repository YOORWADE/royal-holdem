    function GameTable({ gameState, mySeat, onAction, onNextHand, onLeave, canHost, connected, onTableMessage, bgmPlaying, setBgmPlaying, bgmVolume, setBgmVolume, tracks, currentTrackIndex, setCurrentTrackIndex }) {
      const players = safePlayersArray(gameState.players);
      const me = players[mySeat];
      const [tick, setTick] = useState(Date.now());
      const [raiseTo, setRaiseTo] = useState(0);

      const [showChatPanel, setShowChatPanel] = useState(false);
      const [typedMessage, setTypedMessage] = useState("");
      const [activeChatTab, setActiveChatTab] = useState("presets");

      const [seqIndex, setSeqIndex] = useState(-1);
      const [showRaisePop, setShowRaisePop] = useState(false);
      const [showQuickEmoji, setShowQuickEmoji] = useState(false);

      const quickChats = [
        "不要走，决战到天亮！",
        "你的牌打得也忒好了！",
        "怎么又弃牌了？给个机会吧！",
        "我要验牌！！！",
        "赢了！送你一朵小红花~",
        "快点吧，等得我花儿都谢了！",
        "能不能快点啊？",
        "这就是高手的寂寞吗？"
      ];

      const handleSendPreset = (text) => {
        onTableMessage(text);
        setShowChatPanel(false);
      };

      const handleSendTyped = () => {
        if (!typedMessage.trim()) return;
        onTableMessage(typedMessage.trim());
        setTypedMessage("");
        setShowChatPanel(false);
      };

      useEffect(() => {
        const t = setInterval(() => setTick(Date.now()), 250);
        return () => clearInterval(t);
      }, []);

      useEffect(() => {
        const p = players[gameState.currentTurn];
        const minTotal = Math.min((p?.currentBet || 0) + (p?.chips || 0), Math.max(gameState.settings.bigBlind, gameState.currentBet + gameState.minRaise));
        setRaiseTo(minTotal || gameState.settings.bigBlind);
      }, [gameState.handId, gameState.currentTurn, gameState.currentBet, gameState.minRaise]);

      const elapsed = Math.floor((tick - (gameState.turnStartedAt || tick)) / 1000);
      const remaining = Math.max(0, TURN_SECONDS - elapsed);
      const isMyTurn = gameState.currentTurn === mySeat && gameState.stage !== "showdown" && gameState.stage !== "waiting";
      const toCall = me ? Math.max(0, gameState.currentBet - me.currentBet) : 0;
      const maxTotal = me ? me.currentBet + me.chips : 0;
      const minRaiseTotal = me ? Math.min(maxTotal, Math.max(gameState.settings.bigBlind, gameState.currentBet + gameState.minRaise)) : 0;
      const canRaise = isMyTurn && me && me.chips > toCall && maxTotal > gameState.currentBet;

      /* Collapse the raise popover whenever it's no longer the player's turn,
         so the next time they have to act they start from the compact view. */
      useEffect(() => {
        if (!isMyTurn) {
          setShowRaisePop(false);
          setShowQuickEmoji(false);
        }
      }, [isMyTurn, gameState.handId, gameState.currentTurn]);

      const quickRaise = ratio => {
        if (!canRaise) return;
        const target = ratio === "allin"
          ? maxTotal
          : Math.min(maxTotal, Math.max(minRaiseTotal, Math.round((gameState.currentBet + gameState.pot * ratio) / 10) * 10));
        onAction("RAISE", target);
      };

      const autoActedRef = useRef("");
      const prevMyTurnRef = useRef(false);
      const prevRemainingRef = useRef(TURN_SECONDS);

      /* Notify the player when it becomes their turn */
      useEffect(() => {
        if (isMyTurn && !prevMyTurnRef.current) playSFX('yourturn');
        prevMyTurnRef.current = isMyTurn;
      }, [isMyTurn]);

      /* Countdown urgency beeps for the last 5 seconds of your turn */
      useEffect(() => {
        if (isMyTurn && remaining <= 5 && remaining > 0 && remaining !== prevRemainingRef.current) {
          playSFX('tick');
        }
        prevRemainingRef.current = remaining;
      }, [isMyTurn, remaining]);

      useEffect(() => {
        if (!isMyTurn || remaining > 0) return;
        const turnKey = `${gameState.handId}-${gameState.currentTurn}`;
        if (autoActedRef.current === turnKey) return;   /* fire at most once per turn */
        autoActedRef.current = turnKey;
        onAction(toCall === 0 ? "CALL" : "FOLD");
      }, [isMyTurn, remaining]);

      const showdownParticipants = useMemo(() => {
        if (!gameState || !gameState.showdownResults) return [];
        return gameState.showdownResults.filter(r => !r.folded);
      }, [gameState?.showdownResults]);

      useEffect(() => {
        if (gameState?.stage === "showdown" && showdownParticipants.length > 0) {
          setSeqIndex(0);
        } else {
          setSeqIndex(-1);
        }
      }, [gameState?.stage, gameState?.handId, showdownParticipants]);

      useEffect(() => {
        if (seqIndex === -1) return;
        let timer;
        if (seqIndex < showdownParticipants.length) {
          timer = setTimeout(() => {
            setSeqIndex(prev => prev + 1);
          }, 2000);
        } else if (seqIndex === showdownParticipants.length) {
          timer = setTimeout(() => {
            setSeqIndex(prev => prev + 1);
          }, 2800);
        }
        return () => clearTimeout(timer);
      }, [seqIndex, showdownParticipants.length]);

      /* Showdown SFX: whoosh as each hand is revealed, fanfare when the winner is shown */
      useEffect(() => {
        if (seqIndex < 0) return;
        if (seqIndex < showdownParticipants.length) {
          playSFX('reveal');
        } else if (seqIndex === showdownParticipants.length) {
          const iWon = me && gameState.winnerIds?.includes(me.id);
          playSFX(iWon ? 'win' : 'lose');
        }
      }, [seqIndex]);

      /* SFX event controller: driven by authoritative state transitions (not the
         capped actionLog length, which saturates at 6 and would mute later actions). */
      const prevHandIdRef = useRef(null);
      const prevCommCountRef = useRef(0);
      const prevUpdatedAtRef = useRef(0);

      useEffect(() => {
        if (!gameState) return;
        const stage = gameState.stage;
        const handId = gameState.handId || 0;
        const commCount = gameState.communityCards?.length || 0;
        const updatedAt = gameState.updatedAt || 0;
        const logs = gameState.actionLog || [];
        const lastLog = logs[logs.length - 1] || "";

        const isNewHand = prevHandIdRef.current !== null && handId !== prevHandIdRef.current
          && stage !== "waiting" && stage !== "showdown";
        const firstHand = prevHandIdRef.current === null && stage === "preflop";

        if (isNewHand || firstHand) {
          playSFX('deal');                       /* new hand dealt */
        } else if (commCount > prevCommCountRef.current && commCount > 0) {
          playSFX('flip');                       /* flop / turn / river revealed */
        }

        if (!isNewHand && !firstHand && updatedAt !== prevUpdatedAtRef.current && prevUpdatedAtRef.current !== 0) {
          const isStageLabel = lastLog === "翻牌圈" || lastLog === "转牌圈" || lastLog === "河牌圈";
          const isShowdown = lastLog.includes("赢得底池") || lastLog.includes("摊牌") || lastLog.includes("结算");
          if (!isStageLabel && !isShowdown) {
            if (lastLog.includes("弃牌")) playSFX('fold');
            else if (lastLog.includes("看牌") || lastLog.includes("过牌")) playSFX('check');
            else if (lastLog.includes("全下")) playSFX('allin');
            else if (lastLog.includes("加注") || lastLog.includes("跟注") || lastLog.includes("小盲") || lastLog.includes("大盲")) playSFX('chips');
            else if (lastLog.includes("：")) playSFX('chat');   /* table message / emoji */
          }
        }

        prevHandIdRef.current = handId;
        prevCommCountRef.current = commCount;
        prevUpdatedAtRef.current = updatedAt;
      }, [gameState]);

      return (
        <div className="relative h-screen w-screen overflow-hidden bg-[#030409] noise">
          
          <div className="absolute top-3 left-3 right-3 z-30 flex items-start justify-between gap-2 md:gap-3 pointer-events-none">
            {/* PROBLEM 2 FIXED: Sleek horizontal capsule layout for left HUD (Never blocks Seat 1 anymore) */}
            <div className="glass rounded-xl px-3 py-1.5 md:px-4 md:py-3 pointer-events-auto flex flex-row items-center gap-2 md:gap-4 border border-amber-300/10 shrink-0">
              <div>
                <div className="font-royal text-amber-200 font-black tracking-widest text-xs md:text-sm leading-none">ROYAL</div>
                <div className="text-[10px] md:text-xs font-black text-amber-400 mt-1 leading-none">局数: {gameState.handId || 1}/10</div>
              </div>
              <div className="h-5 w-px bg-white/10 shrink-0"></div>
              <div className="text-[10px] md:text-[11px] text-slate-300 leading-tight">
                <div className="font-bold">{gameState.mode === "online" ? "房号: " + gameState.roomID : "智能 AI"}</div>
                <div className="text-amber-300/90 mt-0.5 font-bold">{money(gameState.settings.smallBlind)} / {money(gameState.settings.bigBlind)}</div>
              </div>
              {gameState.mode === "online" && (
                <>
                  <div className="h-5 w-px bg-white/10 shrink-0 hidden sm:block"></div>
                  <div className="scale-90 md:scale-100 origin-left hidden sm:block">
                    <ConnectionBadge connected={connected} mode={gameState.mode} />
                  </div>
                </>
              )}
            </div>

            {/* PROBLEM 2 FIXED: Top-Right cluster with mr-[95px] on mobile to dodge WeChat Capsule button perfectly */}
            <div className="flex items-center gap-2 md:gap-3 pointer-events-auto mr-[95px] sm:mr-0 scale-90 sm:scale-100 origin-right shrink-0">
              <BgmController bgmPlaying={bgmPlaying} setBgmPlaying={setBgmPlaying} bgmVolume={bgmVolume} setBgmVolume={setBgmVolume} tracks={tracks} currentTrackIndex={currentTrackIndex} setCurrentTrackIndex={setCurrentTrackIndex} />
              <button onClick={onLeave} className="action-btn bg-slate-900/80 border border-white/10 text-slate-200 px-3 py-2 text-xs md:text-sm leading-none shrink-0 rounded-xl font-bold">离桌</button>
            </div>
          </div>

          <div className="absolute inset-x-0 top-[10%] bottom-[22%] md:bottom-[26%] flex items-center justify-center pointer-events-none z-10">
            <div className="royal-table-wrap pointer-events-auto">
              <div className="royal-table">
                <div className="gold-bracket left-[8%] top-[10%] border-l-2 border-t-2 rounded-tl-3xl"></div>
                <div className="gold-bracket right-[8%] top-[10%] border-r-2 border-t-2 rounded-tr-3xl"></div>
                <div className="gold-bracket left-[8%] bottom-[10%] border-l-2 border-b-2 rounded-bl-3xl"></div>
                <div className="gold-bracket right-[8%] bottom-[10%] border-r-2 border-b-2 rounded-bl-3xl"></div>

                {players.map((p, i) => {
                  const isMePod = i === mySeat;
                  const participantIndex = showdownParticipants.findIndex(sp => sp.seat === i);
                  const hasSeqRevealed = seqIndex >= participantIndex && seqIndex !== -1 && participantIndex !== -1;
                  const showCards = gameState.stage === "showdown" ? (isMePod || hasSeqRevealed) : false;
                  const isWinnerSeq = seqIndex === showdownParticipants.length && gameState.winnerIds?.includes(p?.id);

                  return (
                    <div key={i} className={isWinnerSeq ? "scale-105 duration-300 shadow-[0_0_40px_rgba(251,191,36,0.7)] rounded-[22px] z-50" : ""}>
                      <SeatPod
                        player={p}
                        index={i}
                        isTurn={gameState.currentTurn === i}
                        isDealer={gameState.dealerIdx === i}
                        isMe={isMePod}
                        remaining={remaining}
                        showCards={showCards}
                        gameState={gameState}
                      />
                    </div>
                  );
                })}

                {gameState.stage === "showdown" && seqIndex !== -1 && (
                  <div className="absolute top-[40%] left-1/2 -translate-x-1/2 -translate-y-1/2 z-40 pointer-events-none w-[90%] max-w-sm">
                    {seqIndex < showdownParticipants.length ? (
                      <div className="glass border border-amber-300 bg-slate-950/95 rounded-2xl p-4 text-center shadow-2xl animate-pulse">
                        <div className="text-[10px] text-amber-300 font-bold tracking-[0.25em] mb-1">🔍 亮牌比拼 🔍</div>
                        <div className="text-sm font-black text-white">
                          【{showdownParticipants[seqIndex].name}】展示底牌
                        </div>
                        <div className="text-xs font-black text-amber-200 mt-1">
                          牌型：{showdownParticipants[seqIndex].evalName}
                        </div>
                      </div>
                    ) : seqIndex === showdownParticipants.length ? (
                      <div className="glass border-2 border-yellow-400 bg-slate-950/95 rounded-[22px] p-5 text-center shadow-2xl scale-105">
                        <div className="text-yellow-400 text-3xl mb-1">👑</div>
                        <div className="text-xs text-yellow-300 font-black tracking-[0.25em] mb-1">恭喜赢家</div>
                        <div className="text-base font-black text-white truncate">
                          {gameState.winnerIds.map(wid => players.find(pl => pl?.id === wid)?.name).filter(Boolean).join(" 与 ")}
                        </div>
                        <div className="text-xs font-bold text-amber-200 mt-1">
                          赢得底池 {money(gameState.showdownPot || gameState.pot)}！
                        </div>
                      </div>
                    ) : null}
                  </div>
                )}

                <div className="absolute inset-0 z-5 flex flex-col items-center justify-center pointer-events-none">
                  <div className="mb-4 flex flex-col items-center">
                    <ChipStack value={gameState.stage === "showdown" ? (gameState.showdownPot || gameState.pot) : gameState.pot} />
                    <div className="mt-2 rounded-full bg-black/[0.36] border border-amber-200/[0.18] px-4 py-1 text-[11px] tracking-[.28em] text-amber-100 font-black">
                      POT {money(gameState.stage === "showdown" ? (gameState.showdownPot || gameState.pot) : gameState.pot)}
                    </div>
                  </div>
                  <div className="flex gap-2 min-h-[90px] items-center">
                    {(gameState.communityCards || []).map((card, i) => <CardView key={i} card={card} hidden={false} delay={i * 95} />)}
                    {Array.from({ length: Math.max(0, 5 - (gameState.communityCards || []).length) }).map((_, i) => (
                      <div key={"ghost" + i} className="card-scene opacity-20"><div className="card"><div className="card-face card-back"></div></div></div>
                    ))}
                  </div>
                  <div className="mt-3 text-[10px] text-emerald-100/50 tracking-[.3em] font-bold">{gameState.stage?.toUpperCase()}</div>
                </div>
              </div>
            </div>
          </div>

          {showChatPanel && (
            <div className="fixed bottom-[150px] md:bottom-28 left-1/2 md:left-4 -translate-x-1/2 md:translate-x-0 w-[94vw] md:w-80 glass rounded-[24px] p-4 z-50 flex flex-col border border-amber-300/30 shadow-2xl animate-fade-in pointer-events-auto">
              <div className="flex items-center justify-between border-b border-white/10 pb-2">
                <div className="flex gap-4">
                  <button 
                    onClick={() => setActiveChatTab("presets")} 
                    className={`text-sm font-black transition-colors ${activeChatTab === "presets" ? "text-amber-300 border-b-2 border-amber-300 pb-1" : "text-slate-400 hover:text-white"}`}
                  >
                    经典快捷语
                  </button>
                  <button 
                    onClick={() => setActiveChatTab("custom")} 
                    className={`text-sm font-black transition-colors ${activeChatTab === "custom" ? "text-amber-300 border-b-2 border-amber-300 pb-1" : "text-slate-400 hover:text-white"}`}
                  >
                    打字聊天
                  </button>
                </div>
                <button onClick={() => setShowChatPanel(false)} className="text-slate-400 hover:text-white font-bold text-sm">✕ 关闭</button>
              </div>

              <div className="my-3 overflow-y-auto max-h-[160px] pr-1">
                {activeChatTab === "presets" ? (
                  <div className="grid grid-cols-1 gap-1.5">
                    {quickChats.map((text, idx) => (
                      <button 
                        key={idx} 
                        onClick={() => handleSendPreset(text)}
                        className="text-left text-xs bg-slate-900/60 hover:bg-slate-800/80 border border-white/5 rounded-xl px-3 py-2 text-slate-200 truncate active:scale-95 transition"
                      >
                        💬 {text}
                      </button>
                    ))}
                  </div>
                ) : (
                  <div className="flex gap-2 items-center mt-1">
                    <input 
                      value={typedMessage} 
                      onChange={e => setTypedMessage(e.target.value)}
                      onKeyDown={e => { if (e.key === 'Enter') handleSendTyped(); }}
                      placeholder="发送桌面消息..." 
                      className="flex-1 rounded-xl bg-black/40 border border-white/10 px-3 py-2 text-xs text-white outline-none focus:border-amber-300/50"
                      maxLength={30}
                    />
                    <button 
                      onClick={handleSendTyped}
                      className="bg-gradient-to-r from-amber-300 to-amber-600 text-slate-950 text-xs font-black px-3 py-2 rounded-xl active:scale-95 transition"
                    >
                      发送
                    </button>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* Compact action HUD. Three logical zones, stacked top→bottom:
              1. INFO strip  — hand cards (left)   · broadcast log (center) · chat icon (right)
              2. ACTION zone — timer + main buttons (only when it's your turn); optional inline raise popover above buttons
              3. STATUS line — passive message when waiting / opponents acting (replaces zone 2)
              Quick-reactions (emojis) and 1/2-POT shortcuts no longer occupy their own row — they're
              tucked behind toggles ("😀" near chat, raise shortcuts inside the raise popover). */}
          <div className="fixed left-1/2 -translate-x-1/2 bottom-2 z-40 w-[min(98vw,680px)] pointer-events-auto">
            <div className="glass rounded-2xl p-2 md:p-3">

              {/* Zone 1 — info strip */}
              <div className="flex items-center gap-2 mb-1.5">
                {me && (me.cards || []).length > 0 ? (
                  <div className="flex gap-1 shrink-0 items-center">
                    <span className="text-[8px] font-black tracking-[0.18em] text-amber-200/70 leading-none hidden sm:inline">HAND</span>
                    {(me.cards || []).map((card, idx) => (
                      <CardView key={idx} card={card} hidden={false} size="sm" delay={idx * 80} />
                    ))}
                  </div>
                ) : <div className="shrink-0 w-1" />}

                {gameState.actionLog?.length > 0 ? (
                  <div className="flex-1 min-w-0 text-center text-[10px] md:text-[11px] font-bold text-amber-200/85 truncate bg-black/35 border border-white/5 rounded-full py-1 px-2">
                    📢 {gameState.actionLog[gameState.actionLog.length - 1]}
                  </div>
                ) : <div className="flex-1" />}

                <div className="flex items-center gap-1 shrink-0">
                  <button
                    onClick={() => { playSFX('button'); setShowQuickEmoji(v => !v); }}
                    className={"rounded-full border w-8 h-8 grid place-items-center text-base active:scale-90 transition " + (showQuickEmoji ? "bg-amber-400/25 border-amber-300/60 text-amber-100" : "bg-slate-900/70 border-white/10 text-slate-200")}
                    title="快捷表情"
                  >😀</button>
                  <button
                    onClick={() => { playSFX('button'); setShowChatPanel(!showChatPanel); }}
                    className="rounded-full bg-gradient-to-r from-amber-400/25 to-yellow-500/25 border border-amber-300/40 w-8 h-8 grid place-items-center text-base text-amber-200 active:scale-90 transition"
                    title="聊天互动"
                  >💬</button>
                </div>
              </div>

              {/* Inline quick-emoji bar — only when toggled */}
              {showQuickEmoji && (
                <div className="mb-1.5 flex flex-wrap gap-1 justify-center bg-black/25 border border-white/5 rounded-xl px-2 py-1.5">
                  {["👍", "🔥", "🤔", "👏", "😱", "💪", "漂亮", "GG"].map(text => (
                    <button
                      key={text}
                      onClick={() => { onTableMessage(text); setShowQuickEmoji(false); }}
                      className="rounded-full bg-slate-900/80 border border-white/10 px-2 py-1 text-xs text-slate-200 active:scale-95 transition"
                    >{text}</button>
                  ))}
                </div>
              )}

              {/* Zone 2/3 — action or status */}
              {gameState.stage === "waiting" ? (
                <div className="flex items-center justify-between gap-3 py-1">
                  <div className="text-xs md:text-sm text-slate-300 truncate">等待房主开局或更多玩家入座。</div>
                  {canHost && <button onClick={onNextHand} className="action-btn bg-amber-400 text-slate-950 px-3 py-1.5 text-xs md:text-sm whitespace-nowrap shrink-0">开始发牌</button>}
                </div>
              ) : isMyTurn ? (
                <div>
                  <div className="timer-track mb-1.5"><div className="timer-fill" style={{ width: `${remaining / TURN_SECONDS * 100}%` }}></div></div>

                  {/* Raise popover — opens above the buttons when RAISE is tapped first */}
                  {showRaisePop && canRaise && (
                    <div className="mb-1.5 flex items-center gap-1.5 bg-black/45 border border-amber-300/25 rounded-xl px-2 py-1.5">
                      <input
                        type="range"
                        min={minRaiseTotal}
                        max={maxTotal}
                        step="10"
                        value={clamp(raiseTo, minRaiseTotal, maxTotal)}
                        onChange={e => setRaiseTo(Number(e.target.value))}
                        className="flex-1 accent-amber-400 min-w-0"
                      />
                      <span className="w-14 text-right text-amber-200 font-black text-[11px] shrink-0">{money(clamp(raiseTo, minRaiseTotal, maxTotal))}</span>
                      <button onClick={() => quickRaise(.5)} className="rounded-md bg-amber-400/15 border border-amber-300/30 px-1.5 py-0.5 text-[10px] text-amber-100 shrink-0">½</button>
                      <button onClick={() => quickRaise(1)} className="rounded-md bg-amber-400/15 border border-amber-300/30 px-1.5 py-0.5 text-[10px] text-amber-100 shrink-0">POT</button>
                      <button onClick={() => quickRaise("allin")} className="rounded-md bg-rose-500/20 border border-rose-300/30 px-1.5 py-0.5 text-[10px] text-rose-100 shrink-0">ALL</button>
                    </div>
                  )}

                  <div className="grid grid-cols-3 gap-1.5">
                    <button onClick={() => onAction("FOLD")} className="action-btn bg-gradient-to-r from-rose-950 to-red-800 text-white py-2 text-sm leading-tight">FOLD<span className="block text-[9px] opacity-70 font-normal">弃牌</span></button>
                    <button onClick={() => onAction("CALL")} className="action-btn bg-gradient-to-r from-emerald-700 to-teal-700 text-white py-2 text-sm leading-tight">{toCall ? "CALL " + money(toCall) : "CHECK"}<span className="block text-[9px] opacity-70 font-normal">{toCall ? "跟注" : "看牌"}</span></button>
                    <button
                      onClick={() => {
                        if (!canRaise) return;
                        if (showRaisePop) {
                          onAction("RAISE", clamp(raiseTo, minRaiseTotal, maxTotal));
                          setShowRaisePop(false);
                        } else {
                          setShowRaisePop(true);
                        }
                      }}
                      disabled={!canRaise}
                      className="action-btn bg-gradient-to-r from-amber-300 via-yellow-500 to-amber-700 text-slate-950 py-2 text-sm leading-tight"
                    >
                      {showRaisePop ? "确认" : "RAISE"}
                      <span className="block text-[9px] opacity-70 font-normal">{showRaisePop ? money(clamp(raiseTo, minRaiseTotal, maxTotal)) : "加注"}</span>
                    </button>
                  </div>
                </div>
              ) : (
                <div className="py-1.5 text-center text-xs text-slate-400 truncate">
                  {gameState.stage === "showdown" ? "正在现场亮牌比拼..." : `轮到 ${players[gameState.currentTurn]?.name || "玩家"} 行动 · ${remaining}s`}
                </div>
              )}
            </div>
          </div>

          {gameState.stage === "showdown" && gameState.showdownResults && seqIndex > showdownParticipants.length && (
            <ShowdownOverlay gameState={gameState} mySeat={mySeat} canNext={canHost} onNext={onNextHand} />
          )}
        </div>
      );
    }

    function App() {
      const [name, setName] = useState(localStorage.getItem("royal_holdem_name") || "玩家");
      const initialRoom = (() => {
        try { return new URLSearchParams(location.search).get("room") || ""; } catch (_) { return ""; }
      })();
      const [roomID, setRoomID] = useState(initialRoom.toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 10));
      const [settings, setSettings] = useState({ startingChips: 1000, smallBlind: 10 });
      const [mode, setMode] = useState(null);
      const [joined, setJoined] = useState(false);
      const [mySeat, setMySeat] = useState(-1);
      const [gameState, setGameState] = useState(null);
      const [connected, setConnected] = useState(false);
      const roomRef = useRef(null);

      /* Autoplay BGM configuration with smooth tactile gesture unlock */
      const [bgmPlaying, setBgmPlaying] = useState(true);
      const [bgmVolume, setBgmVolume] = useState(0.4);
      const [currentTrackIndex, setCurrentTrackIndex] = useState(0);
      const audioRef = useRef(null);

      useEffect(() => {
        if (!audioRef.current) {
          audioRef.current = new Audio(BGM_TRACKS[currentTrackIndex].url);
          audioRef.current.loop = true;
        } else {
          const isPlaying = !audioRef.current.paused;
          audioRef.current.pause();
          audioRef.current.src = BGM_TRACKS[currentTrackIndex].url;
          audioRef.current.load();
          if (isPlaying || bgmPlaying) {
            audioRef.current.play().catch(err => console.warn("音频切换播放失败：", err));
          }
        }
      }, [currentTrackIndex]);

      useEffect(() => {
        if (audioRef.current) {
          audioRef.current.volume = bgmVolume;
        }
      }, [bgmVolume]);

      useEffect(() => {
        if (audioRef.current) {
          if (bgmPlaying) {
            audioRef.current.play().catch(err => {
              console.warn("自动播放遭浏览器拦截，等待用户第一次交互：", err);
            });
          } else {
            audioRef.current.pause();
          }
        }
      }, [bgmPlaying]);

      /* Core user gesture listener to unlock both AudioContext (SFX) and background music */
      useEffect(() => {
        const unlockAudio = () => {
          getAudioCtx(); /* Pre-warm sound synthesizer AudioContext */
          if (audioRef.current && bgmPlaying && audioRef.current.paused) {
            audioRef.current.play()
              .then(() => {
                console.log("音频与音效发生器由用户交互事件成功解锁并自动播放");
              })
              .catch(err => console.warn("音频手势解锁播放仍失败：", err));
          }
          document.removeEventListener("click", unlockAudio);
          document.removeEventListener("touchstart", unlockAudio);
        };
        document.addEventListener("click", unlockAudio);
        document.addEventListener("touchstart", unlockAudio);
        return () => {
          document.removeEventListener("click", unlockAudio);
          document.removeEventListener("touchstart", unlockAudio);
        };
      }, [bgmPlaying]);

      const firebaseReady = !!db;
      const canHost = gameState && mySeat === hostSeat(gameState.players);
      
      /* PROBLEM 2 FIXED: Restored variable target exact definition matching original architecture */
      const roomLink = useMemo(() => {
        try {
          const url = new URL(location.href);
          if (roomID) url.searchParams.set("room", roomID);
          return url.toString();
        } catch (_) {
          return roomID;
        }
      }, [roomID]);

      useEffect(() => {
        localStorage.setItem("royal_holdem_name", name || "玩家");
      }, [name]);

      /* PROBLEM 1 FIXED: Intelligent automatic seat reclaim / auto-reconnect logic */
      useEffect(() => {
        if (mode !== "online" || !gameState || mySeat !== -1) return;
        const players = safePlayersArray(gameState.players);
        const existingSeatIdx = players.findIndex(p => p && p.id === uid);
        if (existingSeatIdx >= 0) {
          setMySeat(existingSeatIdx);
          // Set seat online and update lastseen heartbeat in Firebase Database
          if (roomRef.current) {
            try {
              const seatRef = roomRef.current.child(`players/${existingSeatIdx}`);
              seatRef.update({
                online: true,
                lastSeen: Date.now()
              });
            } catch (e) {
              console.warn("自动回桌状态刷新同步失败:", e);
            }
          }
        }
      }, [mode, gameState, mySeat]);

      useEffect(() => {
        const handleUnload = () => {
          if (mode === "online" && roomRef.current && mySeat >= 0) {
            roomRef.current.child(`players/${mySeat}`).remove();
          }
        };
        window.addEventListener("beforeunload", handleUnload);
        window.addEventListener("unload", handleUnload);
        window.addEventListener("pagehide", handleUnload);
        return () => {
          window.removeEventListener("beforeunload", handleUnload);
          window.removeEventListener("unload", handleUnload);
          window.removeEventListener("pagehide", handleUnload);
        };
      }, [mode, mySeat]);

      useEffect(() => {
        if (!db) return;
        const connRef = db.ref(".info/connected");
        const handler = snap => setConnected(snap.val() === true);
        connRef.on("value", handler);
        return () => connRef.off("value", handler);
      }, []);

      useEffect(() => {
        if (mode !== "ai" || !gameState) return;
        const cur = safePlayersArray(gameState.players)[gameState.currentTurn];
        if (!cur?.isAI || gameState.stage === "showdown" || gameState.stage === "waiting") return;
        const delay = 650 + Math.random() * 900;
        const t = setTimeout(() => {
          const choice = decideAI(gameState, gameState.currentTurn);
          setGameState(s => processAction(s, gameState.currentTurn, choice.action, choice.raiseTo));
        }, delay);
        return () => clearTimeout(t);
      }, [mode, gameState?.handId, gameState?.currentTurn, gameState?.stage, gameState?.updatedAt]);

      useEffect(() => {
        if (mode !== "online" || !gameState || !canHost || !gameState.pendingAction) return;
        const pending = gameState.pendingAction;
        updateOnline(s => {
          if (!s.pendingAction || s.pendingAction.id !== pending.id) return s;
          if (s.currentTurn !== s.pendingAction.seat) return { ...s, pendingAction: null, updatedAt: Date.now() };
          return processAction({ ...s, pendingAction: null }, s.pendingAction.seat, s.pendingAction.action, s.pendingAction.raiseTo);
        });
      }, [mode, canHost, gameState?.pendingAction?.id]);

      useEffect(() => {
        if (mode !== "online" || !gameState || !canHost) return;
        if (gameState.stage === "waiting" || gameState.stage === "showdown") return;
        const t = setInterval(() => updateOnline(s => watchdogAdvance(s)), 1000);
        return () => clearInterval(t);
      }, [mode, canHost, gameState?.handId, gameState?.currentTurn, gameState?.stage]);

      useEffect(() => {
        if (mode !== "online" || !gameState || !canHost) return;
        if (gameState.stage !== "waiting" && gameState.stage !== "showdown") return;
        updateOnline(s => cleanupOfflineSeats(s));
      }, [mode, canHost, gameState?.stage, gameState?.players?.map?.(p => p?.online).join("|")]);

      useEffect(() => {
        if (mode !== "online" || !roomRef.current || mySeat < 0 || !connected) return;
        const seatRef = roomRef.current.child(`players/${mySeat}`);
        const seat = mySeat;
        try {
          seatRef.child("online").set(true);
          seatRef.child("lastSeen").set(Date.now());
          seatRef.child("online").onDisconnect().set(false);
        } catch (_) {}
        const hb = setInterval(() => {
          try { seatRef.child("lastSeen").set(Date.now()); } catch (_) {}
        }, 4000);
        return () => {
          clearInterval(hb);
        };
      }, [mode, mySeat, connected]);

      useEffect(() => {
        if (mode !== "online" || !canHost) return;
        const STALE_MS = 15000;
        const t = setInterval(() => {
          updateOnline(s => {
            const players = safePlayersArray(s.players);
            const now = Date.now();
            let changed = false;
            for (let i = 0; i < players.length; i++) {
              const p = players[i];
              if (p && !p.isAI && p.id !== uid && p.online !== false && p.lastSeen && now - p.lastSeen > STALE_MS) {
                players[i] = { ...p, online: false };
                changed = true;
              }
            }
            if (!changed) return;
            return { ...s, players, updatedAt: now };
          });
        }, 5000);
        return () => clearInterval(t);
      }, [mode, canHost]);

      useEffect(() => {
        if (!gameState || gameState.stage !== "showdown") return;

        const isMatchEnd = gameState.handId >= 10;
        if (isMatchEnd) return;

        if (mode === "online" && !canHost) return;

        const delay = 5500;
        const t = setTimeout(() => {
          if (mode === "online") updateOnline(s => s.finalWinnerId ? s : startHand(s, s.settings));
          else setGameState(s => s?.finalWinnerId ? s : startHand(s, s.settings));
        }, delay);
        return () => clearTimeout(t);
      }, [mode, canHost, gameState?.handId, gameState?.stage]);

      function startAI() {
        const human = createPlayer((name || "玩家").slice(0, 12), 0, settings.startingChips, { id: uid });
        const players = [
          human,
          createPlayer(AI_NAMES[0], 1, settings.startingChips, { isAI: true, persona: AI_PERSONAS[0] }),
          createPlayer(AI_NAMES[1], 2, settings.startingChips, { isAI: true, persona: AI_PERSONAS[1] }),
          createPlayer(AI_NAMES[2], 3, settings.startingChips, { isAI: true, persona: AI_PERSONAS[2] })
        ];
        const base = { mode: "ai", players, settings: { ...settings, bigBlind: settings.smallBlind * 2 }, dealerIdx: 3, stage: "waiting", pot: 0 };
        setMode("ai");
        setJoined(true);
        setMySeat(0);
        setGameState(startHand(base, { ...settings, bigBlind: settings.smallBlind * 2 }));
      }

      function detachRoom() {
        if (roomRef.current) roomRef.current.off();
        roomRef.current = null;
      }

      function joinOnline() {
        if (!db) return;
        const rid = (roomID || ("VIP" + Math.floor(1000 + Math.random() * 9000))).toUpperCase();
        setRoomID(rid);
        try {
          const url = new URL(location.href);
          url.searchParams.set("room", rid);
          history.replaceState(null, "", url.toString());
        } catch (_) {}
        setMode("online");
        setJoined(true);
        const ref = db.ref("royalHoldemRooms/" + rid);
        roomRef.current = ref;
        ref.transaction(raw => {
          if (!raw) {
            return {
              mode: "online",
              roomID: rid,
              settings: { ...settings, bigBlind: settings.smallBlind * 2 },
              players: [null, null, null, null],
              dealerIdx: 3,
              stage: "waiting",
              pot: 0,
              currentTurn: -1,
              handId: 0,
              actionLog: ["房间已创建"],
              updatedAt: Date.now()
            };
          }
          const s = safeGameState(raw);
          return { ...s, players: safePlayersArray(s.players), updatedAt: Date.now() };
        });
        ref.on("value", snap => setGameState(safeGameState(snap.val())));
      }

      function sitDown(seat) {
        if (!roomRef.current) return;
        roomRef.current.transaction(raw => {
          const s = safeGameState(raw) || { mode: "online", roomID, settings: { ...settings, bigBlind: settings.smallBlind * 2 }, players: [null, null, null, null], stage: "waiting", dealerIdx: 3 };
          const players = safePlayersArray(s.players);
          if (players[seat] && players[seat].online !== false && players[seat].id !== uid) return;
          players[seat] = createPlayer((name || "玩家").slice(0, 12), seat, s.settings.startingChips, { id: uid });
          return { ...s, players, actionLog: [...(s.actionLog || []), `${players[seat].name} 入座 ${seat + 1} 号位`].slice(-6), updatedAt: Date.now() };
        }, (err, ok) => {
          if (!err && ok) {
            setMySeat(seat);
            const pRef = roomRef.current.child(`players/${seat}`);
            pRef.update({ online: true, id: uid, lastSeen: Date.now() });
          }
        });
      }

      const performLeave = () => {
        detachRoom();
        setMode(null);
        setJoined(false);
        setMySeat(-1);
        setGameState(null);
      };

      function updateOnline(mutator) {
        if (!roomRef.current) return;
        roomRef.current.transaction(raw => {
          const s = safeGameState(raw);
          if (!s) return raw;
          return mutator(s);
        });
      }

      function doAction(action, raiseTo = 0) {
        if (mode === "online") {
          updateOnline(s => {
            if (s.currentTurn !== mySeat || s.stage === "waiting" || s.stage === "showdown") return s;
            return {
              ...s,
              pendingAction: {
                id: `${uid}_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`,
                seat: mySeat,
                action,
                raiseTo: Number(raiseTo) || 0,
                at: Date.now()
              },
              updatedAt: Date.now()
            };
          });
        } else {
          setGameState(s => processAction(s, mySeat, action, raiseTo));
        }
      }

      function nextHand() {
        if (gameState && gameState.handId >= 10) {
          resetRound();
          return;
        }
        if (mode === "online") {
          updateOnline(s => {
            if (mySeat !== hostSeat(s.players)) return s;
            return startHand(s, s.settings);
          });
        } else {
          setGameState(s => startHand(s, s.settings));
        }
      }

      function resetRound() {
        if (mode === "online") {
          updateOnline(s => {
            if (mySeat !== hostSeat(s.players)) return s;
            return resetTournament(s, s.settings);
          });
        } else {
          setGameState(s => resetTournament(s, s.settings));
        }
      }

      function sendTableMessage(text) {
        const payload = {
          id: `${uid}_${Date.now()}`,
          seat: mySeat,
          text,
          at: Date.now()
        };
        if (mode === "online") {
          updateOnline(s => ({
            ...s,
            tableReaction: payload,
            actionLog: [...(s.actionLog || []), `${safePlayersArray(s.players)[mySeat]?.name || "玩家"}：${text}`].slice(-8),
            updatedAt: Date.now()
          }));
        } else {
          setGameState(s => ({
            ...s,
            tableReaction: payload,
            actionLog: [...(s.actionLog || []), `${safePlayersArray(s.players)[mySeat]?.name || "玩家"}：${text}`].slice(-8),
            updatedAt: Date.now()
          }));
        }
      }

      function copyRoomLink() {
        if (navigator.clipboard?.writeText) navigator.clipboard.writeText(roomLink).catch(() => {});
      }

      function leave() {
        playSFX('button');
        if (mode === "online" && roomRef.current && mySeat >= 0) {
          const leavingRef = roomRef.current;
          const seat = mySeat;
          try { leavingRef.child(`players/${seat}/online`).onDisconnect().cancel(); } catch (_) {}
          try {
            leavingRef.transaction(raw => {
              const s = safeGameState(raw);
              if (!s) return raw;
              const players = safePlayersArray(s.players);
              if (!players[seat] || players[seat].id !== uid) return s;
              const playerName = players[seat].name;
              const leavingBet = Number(players[seat].totalBet) || 0;
              const activeHand = s.stage !== "waiting" && s.stage !== "showdown";
              players[seat] = null;
              return {
                ...s,
                players,
                deadPot: activeHand ? (Number(s.deadPot) || 0) + leavingBet : (Number(s.deadPot) || 0),
                pendingAction: s.pendingAction?.seat === seat ? null : s.pendingAction,
                actionLog: [...(s.actionLog || []), `${playerName} 已离桌，座位释放`].slice(-6),
                updatedAt: Date.now()
              };
            });
          } catch (err) {
            console.warn("离桌时释放座位失败，将由断线清理兜底：", err);
          }
        }
        performLeave();
      }

      useEffect(() => () => detachRoom(), []);

      if (!joined) {
        return <Lobby onStartAI={startAI} onJoinOnline={joinOnline} name={name} setName={setName} roomID={roomID} setRoomID={setRoomID} settings={settings} setSettings={setSettings} firebaseReady={firebaseReady} connected={connected} roomLink={roomLink} onCopyRoomLink={copyRoomLink} bgmPlaying={bgmPlaying} setBgmPlaying={setBgmPlaying} bgmVolume={bgmVolume} setBgmVolume={setBgmVolume} tracks={BGM_TRACKS} currentTrackIndex={currentTrackIndex} setCurrentTrackIndex={setCurrentTrackIndex} />;
      }

      if (mode === "online" && mySeat < 0) {
        return <SeatSelect gameState={gameState} myName={name} onSit={sitDown} onStart={nextHand} isHost={canHost} roomID={roomID} connected={connected} onLeave={leave} bgmPlaying={bgmPlaying} setBgmPlaying={setBgmPlaying} bgmVolume={bgmVolume} setBgmVolume={setBgmVolume} tracks={BGM_TRACKS} currentTrackIndex={currentTrackIndex} setCurrentTrackIndex={setCurrentTrackIndex} />;
      }

      if (!gameState) {
        return <div className="min-h-screen grid place-items-center text-slate-300 bg-slate-950">正在加载皇家牌桌...</div>;
      }

      return <GameTable gameState={gameState} mySeat={mySeat} onAction={doAction} onNextHand={nextHand} onLeave={leave} canHost={mode === "ai" || canHost} connected={connected} onTableMessage={sendTableMessage} bgmPlaying={bgmPlaying} setBgmPlaying={setBgmPlaying} bgmVolume={bgmVolume} setBgmVolume={setBgmVolume} tracks={BGM_TRACKS} currentTrackIndex={currentTrackIndex} setCurrentTrackIndex={setCurrentTrackIndex} />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
